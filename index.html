<body>
  <div class="body-box">
    <div class="content-box">
      <!-- first the sign in form -->
      <div class="sign-in-box">
        <h1>Sign in</h1>
        <div class="icons">
          <img src="icons/facebook.svg" alt="">
          <img src="icons/google-plus.svg" alt="">
          <img src="icons/linkedin.svg" alt="">
        </div>
        <h5>or use your account</h5>
        <form action="">
          <input type="email" id="email" placeholder="Email"><br>
          <input type="password" id="password" placeholder="Password"><br>
          <input type="button" value="Forgot your password?"><br>
          <input type="submit" value="SIGN IN">
        </form>
      </div>
    
      <div class="counter-box">
        <h1>Hello, Friend!</h1>
        <h4>Enter your personal details and start your journey with us</h4>
        <button class="switch-btn">SIGN UP</button>
      </div>
